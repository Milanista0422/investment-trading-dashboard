<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Signals v2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }
        .tab-nav { display: flex; background: #111827; border-bottom: 2px solid #1e3a8a; position: sticky; top: 0; z-index: 1000; padding: 0 20px; }
        .tab-btn { padding: 14px 24px; font-size: 14px; font-weight: 600; color: #6b7280; background: none; border: none; border-bottom: 3px solid transparent; cursor: pointer; transition: all 0.2s; margin-bottom: -2px; white-space: nowrap; }
        .tab-btn:hover { color: #93c5fd; }
        .tab-btn.active { color: #3b82f6; border-bottom-color: #3b82f6; }
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .summary-banner { background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%); border-radius: 8px; padding: 20px; margin-bottom: 20px; border-left: 4px solid #3b82f6; }
        .summary-header { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
        .signal-distribution { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; margin: 12px 0; }
        .signal-item { background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 6px; font-size: 12px; text-align: center; border-left: 3px solid; }
        .signal-item.strong-buy { border-color: #10b981; }
        .signal-item.buy { border-color: #34d399; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
        .card { background: #1e293b; border-radius: 8px; padding: 16px; border-left: 4px solid #10b981; }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .ticker-name { font-size: 16px; font-weight: 700; }
        .card-price { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        @media (max-width: 600px) { .container { padding: 12px; } .cards-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('signals',this)">📊 シグナル</button>
        <button class="tab-btn" onclick="switchTab('sector',this)">🏭 セクター ETF</button>
    </nav>

    <div id="tab-signals" class="tab-panel active" style="display:block">
        <div class="container">
            <div class="summary-banner">
                <div class="summary-header">📊 Trading Signals Dashboard v2</div>
                <div class="summary-date" style="color:#cbd5e1; font-size:12px;">更新日時: 2026-05-06 04:00 JST</div>
                <div class="signal-distribution">
                    <div class="signal-item strong-buy">🟢 STRONG_BUY: 16</div>
                    <div class="signal-item buy">🔵 BUY: 5</div>
                </div>
            </div>
            <div class="cards-grid">
                <div class="card">
                    <div class="card-header"><div class="ticker-name">NVDA</div></div>
                    <div class="card-price">$196.52</div>
                    <canvas id="chart-nvda" width="250" height="120"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-sector" class="tab-panel" style="display:none">
        <div class="container" style="padding:40px;text-align:center;color:#94a3b8;">セクター ETF 準備中...</div>
    </div>

    <script>
        function switchTab(name, btn) {
            document.querySelectorAll('.tab-panel').forEach(p => { p.classList.remove('active'); p.style.display = 'none'; });
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            var panel = document.getElementById('tab-' + name);
            if (panel) { panel.classList.add('active'); panel.style.display = 'block'; }
            if (btn) btn.classList.add('active');
        }
    </script>
</body>
</html>
